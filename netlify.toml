# Netlify deployment config.
# Set VITE_API_URL in the Netlify UI (Site settings → Environment) to the
# backend's public URL, e.g. https://api.your-domain.com
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "24.16.0"

# SPA fallback: client-side routes resolve to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
