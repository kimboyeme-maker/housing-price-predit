name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Provision node + the aube package manager (aqua:jdx/aube) via mise.
      # Tools are read from mise.toml at the repo root.
      - name: Set up mise + aube
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: aube install --frozen-lockfile

      - name: Lint
        run: aube run lint

      - name: Type-check & build
        run: aube run build
