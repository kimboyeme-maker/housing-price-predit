# Local full-stack demo: builds the frontend and runs it alongside the backend
# image published by the backend repo's CI. In production the two are deployed
# separately (frontend → Vercel, backend → VPS).
services:
  api:
    image: ghcr.io/kimboyeme-maker/housing-price-predit:latest
    ports:
      - "8000:8000"
    environment:
      HPP_CORS_ORIGINS: "*"

  web:
    build:
      context: .
      args:
        # Same-origin: nginx proxies /api → the api service.
        VITE_API_URL: /api
    ports:
      - "8080:8080"
    depends_on:
      - api
