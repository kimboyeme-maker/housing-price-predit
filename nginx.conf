server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip static assets.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache hashed build assets aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API calls to the backend. Default targets the compose service "api";
    # override by editing this line for other self-hosted setups. (On Vercel the
    # app talks to the backend directly via VITE_API_URL and this file is unused.)
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_request_headers on;
    }

    # SPA fallback — every unknown path serves index.html for client routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
